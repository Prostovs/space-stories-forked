- type: gamePreset
  id: STDistressSignal
  alias:
  - stdistresssignal
  - stcmds
  name: rmc-distress-signal-title
  description: rmc-distress-signal-description
  showInVote: false
  minPlayers: 51
  supportedMaps: STDefaultMapPool
  rules:
  - CMDistressSignal

- type: gamePreset
  id: STDistressSignalLowPop
  alias:
  - stdistresssignallowpop
  - stdslowpop
  - stlowpop
