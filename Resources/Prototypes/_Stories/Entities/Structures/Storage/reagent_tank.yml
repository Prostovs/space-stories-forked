- type: entity
  parent: RMCTankReagentEmpty
  id: STTankReagentMethane
  suffix: Methane
  components:
  - type: RMCToggleableSolutionTransfer
    direction: Output
  - type: Sprite
    layers:
    - state: methanetank
    - state: t_inactive
    - state: t_100
      map: ["enum.RMCTankVisualLayers.Meter"]
      visible: false
    - state: filling
      map: ["enum.RMCTankVisualLayers.TransferMode"]
      visible: false
  - type: SolutionContainerManager
    solutions:
      tank:
        reagents:
        - ReagentId: RMCMethane
          Quantity: 1000
  - type: Label
    currentLabel: reagent-name-rmcmethane

