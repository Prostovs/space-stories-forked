- type: entity
  parent: ColMarTechBase
  id: ColMarTechEquipmentSEA
  name: ColMarTech SEA equipment rack
  description: An automated rack hooked up to a colossal storage of Senior Enlisted Advisor standard-issue equipment.
  suffix: SEA
  components:
  - type: AccessReader
    access: [["CMAccessSEA"]]
  - type: Sprite
    sprite: _RMC14/Structures/Machines/VendingMachines/ColMarTech/equipment.rsi
  - type: CMAutomatedVendor
    jobs:
    - CMSeniorEnlistedAdvisor
    sections:
    - name: Стандартное Оборудование
      takeAll: CMStandard
      entries:
      - id: CMJumpsuitBO
      - id: RMCHeadsetSEA
      - id: CMSatchel
      - id: CMBootsBlackFilled
      - id: CMMRE
    - name: Перчатки
      choices: { CMGloves: 1 }
      entries:
      - id: CMHandsBlackMarine
      - id: CMHandsInsulated
    - name: Пояс
      choices: { CMBelt: 1 }
      entries:
      - id: RMCBeltUtilityGeneral
      - id: CMBeltUtilityFilled
        name: пояс M276 для инструментов (полный)
      - id: CMBeltMedicBagFilled
        name: пояс M276 медицинский (полный)
      - id: CMBeltUtilityCombatFilled
        name: пояс M276 боевой для инструментов (полный)
    - name: Подсумки
      choices: { CMPouches: 2 }
      entries:
      - id: RMCPouchAutoinjectorFill
      - id: RMCPouchGeneralLarge
      - id: RMCPouchMagazineLarge
      - id: RMCPouchMagazinePistolLarge
      - id: RMCPouchShotgunLarge
      - id: RMCPouchMedkit
      - id: RMCPouchPistol
      - id: RMCPouchSling
    - name: Шапка
      choices: { CMHat: 1 }
      entries:
      - id: CMHeadCapDrill
    - name: Шлем
      choices: { CMHelmet: 1 }
      entries:
      - id: ArmorHelmetM10
    - name: Броня
      choices: { CMArmor: 1 }
      entries:
      - id: CMArmorM3VLBallistics
      - id: RMCArmorM3LightPadded
      - id: RMCArmorM3MediumVariants
    - name: Jacket
      choices: { CMCoat: 1 }
      entries:
      - id: RMCCoatService
    - name: Очки
      choices: { CMEyewear: 1 }
      entries:
      - id: RMCWeldingGoggles
      - id: RMCGlassesMedicalHUDGlasses
      #Prescription Medical HUD Glasses
      - id: CMGlassesSecurity
      - id: RMCGlassesMarineRpg #Sunglasses Placeholder
      - id: RMCSunglasses
    - name: Аксессуары
      choices: { CMAccessories: 1 }
      entries:
      - id: CMWebbingBrown
      - id: CMWebbingBlack
      - id: CMWebbingHolster
      - id: CMWebbing
      - id: CMWebbingPouch

