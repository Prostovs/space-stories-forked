- type: entity
  parent: [StorageTank, StructureWheeled]
  id: RMCTankReagentEmpty
  name: reagent tank
  description: A reagent tank, typically used to store large quantities of chemicals.
  suffix: Empty
  components:
  - type: Sprite
    sprite: _RMC14/Structures/Storage/reagent_tank.rsi
    layers:
    - state: tank_normal
    - state: tn_color-1
    - state: tn_color-1
      map: ["enum.SolutionContainerLayers.Fill"]
      visible: false
    - state: t_inactive
    # Stories-Ordnance-Start
    - state: t_100
      map: ["enum.RMCTankVisualLayers.Meter"]
      visible: false
    - state: filling
      map: ["enum.RMCTankVisualLayers.TransferMode"]
      visible: false
    # Stories-Ordnance-End
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.4"
        density: 155
        mask:
        - MachineMask
        - HighImpassable
        layer:
        - HighImpassable
        - BulletImpassable
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
  # Stories-Ordnance-Start
      - !type:TriggerBehavior
      - !type:SpillBehavior
        solution: tank
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTypeTrigger
        damageType: Heat
        damage: 5
      behaviors:
      - !type:SolutionExplosionBehavior
        solution: tank
    - trigger:
        !type:DamageTypeTrigger
        damageType: Piercing
        damage: 5
      behaviors:
      - !type:SolutionExplosionBehavior
        solution: tank
  - type: DamageOnToolInteract
    tools: Welding
    weldingDamage:
      types:
        Heat: 10
  # Stories-Ordnance-End
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 2
    fillBaseName: tn_color-
  - type: DetailedExaminableSolution
    solution: tank
  - type: RMCToggleableSolutionTransfer
    # Stories-Ordnance-Start
    direction: Input
    # Stories-Ordnance-End
    solution: tank
  # Stories-Ordnance-Start
  - type: RMCTankVisuals
  - type: OrdnanceCasing
    requiredAssemblyMode: None
    updateAppearance: false
    isAssembly: false
    hasBlastDampener: false
    maxExplosionPower: 175
    maxShards: 32
    maxFireRadius: 5
    maxFireIntensity: 20
    maxFireDuration: 24
  # Stories-Ordnance-End
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 1000
  - type: Corrodible
    timeToApply: 4
    structure: true
  - type: Tag
    tags:
    - RMCTankReagent
    - Structure
  - type: XenoCrusherChargable
    instantDestroy: true
    passOnDestroy: true
  - type: RMCMesonsNonviewable
  - type: InteractedBlacklist
    blacklist:
      components:
      - Xeno

- type: entity
  parent: RMCTankReagentEmpty
  id: RMCTankReagentWater
  suffix: Water
  components:
  # Stories-Ordnance-Start
  - type: RMCToggleableSolutionTransfer
    direction: Output
  - type: Sprite
    layers:
    - state: watertank
    - state: t_inactive
    - state: t_100
      map: ["enum.RMCTankVisualLayers.Meter"]
      visible: false
    - state: filling
      map: ["enum.RMCTankVisualLayers.TransferMode"]
      visible: false
  # Stories-Ordnance-End
  - type: SolutionContainerManager
    solutions:
      tank:
        reagents:
        - ReagentId: Water
          Quantity: 1000
  - type: Label
    currentLabel: reagent-name-water

- type: entity
  parent: RMCTankReagentWater
  id: RMCTankReagentWaterLocked
  suffix: Water, Locked
  components:
  # Stories-Ordnance-Start
  - type: RMCToggleableSolutionTransfer
    direction: Output
  # Stories-Ordnance-End
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
    flags: None


- type: entity
  parent: RMCTankReagentEmpty
  id: RMCTankReagentFuel
  name: fuel tank
  description: A fuel tank, normally used to hold welding fuel. It's painted red with explosive warning labels.
  suffix: Fuel
  components:
  # Stories-Ordnance-Start
  - type: RMCToggleableSolutionTransfer
    direction: Output
  # Stories-Ordnance-End
  - type: Sprite
    layers:
    - state: weldtank
    # Stories-Ordnance-Start
    - state: t_inactive
    - state: t_100
      map: ["enum.RMCTankVisualLayers.Meter"]
      visible: false
    - state: filling
      map: ["enum.RMCTankVisualLayers.TransferMode"]
      visible: false
    # Stories-Ordnance-End
  - type: SolutionContainerManager
    solutions:
      tank:
        reagents:
        - ReagentId: RMCWeldingFuel # Stories-Ordance
          Quantity: 1000
  - type: ReagentTank
    tankType: Fuel
  - type: DamageOnToolInteract
    tools: Welding
    weldingDamage:
      types:
        Heat: 100
  - type: Label
    currentLabel: reagent-name-welding-fuel
  - type: Tag
    tags:
    - RMCTankFuel
    - RMCTankReagent

- type: Tag
  id: RMCTankFuel

- type: Tag
